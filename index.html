<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Gestion de empleados</h1>
    </header>

    <main>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="puesto" placeholder="Puesto">
        <input type="number" id="salario" placeholder="Salario">
        <input type="text" id="id" placeholder="ID">
        
        <button id="btnAgregarEmpleado">Agregar</button>

        <br>

        <input type="text" id="filtro" placeholder="Filtrar por puesto">
        <button id="btnfiltrar">Filtrar</button>
        
        <button id="btnordenar">Ordenar por salario</button>

        <button id="btnmostrar">Mostrar todos</button>

        <br>

        <div id="resultado"></div>
    </main>

    <script src="js/scripts.js"></script>
</body>
</html>
